name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Unit tests (shared)
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Backend syntax check
        run: node --check backend/src/index.js
