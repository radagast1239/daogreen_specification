# Adds HTTPS via existing site certificate — no separate subdomain needed.
# Paste inside your nginx server { listen 443 ssl; ... } block:

location = /spec {
    return 301 /spec/;
}

location /spec/ {
    proxy_pass http://62.233.35.206/spec/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

