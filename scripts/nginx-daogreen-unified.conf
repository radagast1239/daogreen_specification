# Nginx: единая точка входа (порт 80)
# /           → hub redirect или static hub
# /spec/      → daogreen-spec :3002
# /berry/     → berry calculator
# /economic/  → daogreen calculator :8080

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    client_max_body_size 20m;

    location = / {
        return 302 /spec/hub;
    }

    location /spec/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /berry {
        return 301 /berry/;
    }

    location /berry/ {
        alias /opt/berry-calculator/dist/;
        index index.html;
        try_files $uri $uri/ /berry/index.html;
    }

    location /berry/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /economic {
        return 301 /economic/;
    }

    location /economic/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
