# Nginx: единая точка входа (порт 80)
# /spec/      → daogreen-spec :3002
# /berry/     → berry calculator static
# /economic/  → daogreen calculator :8080
# /api/ /uploads/ → spec backend (для клиентских ссылок без :3002)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name spec.nikita-daogreen.ru 62.233.35.206 _;
    client_max_body_size 20m;

    location = / {
        return 302 /spec/;
    }

    location = /spec/hub {
        alias /opt/daogreen-spec/scripts/daogreen-hub.html;
        default_type text/html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /spec/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /berry {
        return 301 /berry/;
    }

    location /berry/ {
        alias /opt/berry-calculator/dist/;
        index index.html;
        try_files $uri $uri/ /berry/index.html;
    }

    location /berry/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /economic {
        return 301 /economic/;
    }

    location /economic/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — после certbot (DOMAIN=spec.example.com EMAIL=you@mail.ru ./setup-ssl.sh)
# certbot добавит server { listen 443 ssl; ... } с теми же location
