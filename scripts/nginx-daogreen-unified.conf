# Nginx: единая точка входа (порт 80)
# /spec/      → daogreen-spec :3002
# /berry/     → berry calculator static
# /economic/  → daogreen calculator :8080
# /api/ /uploads/ → spec backend (для клиентских ссылок без :3002)

server {
    listen 80;
    listen [::]:80;
    server_name spec.nikita-daogreen.ru 62.233.35.206 _;
    client_max_body_size 20m;

    location = / {
        return 302 /spec/;
    }

    # Старые клиентские ссылки без /spec/
    location ~ ^/client/p/(.*)$ {
        return 301 /spec/client/p/$1;
    }
    location ~ ^/client/([^/]+)$ {
        return 301 /spec/client/p/$1;
    }

    location = /spec/hub {
        alias /opt/daogreen-spec/scripts/daogreen-hub.html;
        default_type text/html;
    }

    # HTML и SW — без долгого кэша (хеши только у /spec/assets/*)
    location = /spec/index.html {
        proxy_pass http://127.0.0.1:3002/index.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /spec/sw.js {
        proxy_pass http://127.0.0.1:3002/sw.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /spec/manifest.webmanifest {
        proxy_pass http://127.0.0.1:3002/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /spec/assets/ {
        alias /opt/daogreen-spec/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip on;
        gzip_types application/javascript text/css application/json;
        gzip_min_length 256;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /spec/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /berry {
        return 301 /berry/;
    }

    # Berry SPA собран с тройным префиксом /berry/berry/berry/api/ — проксируем на API
    location /berry/berry/berry/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /berry/ {
        alias /opt/berry-calculator/dist/;
        index index.html;
        try_files $uri $uri/ /berry/index.html;
    }

    location /berry/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /economic {
        return 301 /economic/;
    }

    location = /salad {
        return 301 /salad/;
    }

    location = /finmodel {
        return 301 /finmodel/;
    }

    # Профили калькулятора (app-profile.js): /salad/ — посадка, /finmodel/ — экономика
    location /salad/ {
        rewrite ^/salad/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /finmodel/ {
        rewrite ^/finmodel/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Совместимость: /economic/finmodel/ → тот же бэкенд
    location /economic/finmodel/ {
        rewrite ^/economic/finmodel/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /economic/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — после certbot (DOMAIN=spec.example.com EMAIL=you@mail.ru ./setup-ssl.sh)
# certbot добавит server { listen 443 ssl; ... } с теми же location
