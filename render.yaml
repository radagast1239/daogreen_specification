services:
  - type: web
    name: daogreen-spec
    runtime: node
    plan: free
    buildCommand: npm run build:all
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: ./backend/data/daogreen.db
      - key: CORS_ORIGIN
        value: https://radagast1239.github.io,http://localhost:5173
